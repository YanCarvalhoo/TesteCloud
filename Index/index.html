<!DOCTYPE html>
<html lang="pt-br">
<head>

    <!-- =============================== -->
    <!-- CONFIGURAÇÕES BÁSICAS -->
    <!-- =============================== -->
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Produtos | System Product</title>

    <!-- RESPONSIVIDADE -->
    <meta name="viewport" content="width=device-width, initial-scale=1">


    <!-- =============================== -->
    <!-- FONTES (GOOGLE FONTS) -->
    <!-- =============================== -->
    <!-- Syne = títulos | DM Sans = textos -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">


    <!-- =============================== -->
    <!-- CSS PRINCIPAL -->
    <!-- =============================== -->
    <link rel="stylesheet" href="style.css">


    <!-- =============================== -->
    <!-- ÍCONES (PWA / FAVICON) -->
    <!-- =============================== -->

    <!-- Apple -->
    <link rel="apple-touch-icon" sizes="57x57" href="/apple-icon-57x57.png">
    <link rel="apple-touch-icon" sizes="60x60" href="/apple-icon-60x60.png">
    <link rel="apple-touch-icon" sizes="72x72" href="/apple-icon-72x72.png">
    <link rel="apple-touch-icon" sizes="76x76" href="/apple-icon-76x76.png">
    <link rel="apple-touch-icon" sizes="114x114" href="/apple-icon-114x114.png">
    <link rel="apple-touch-icon" sizes="120x120" href="/apple-icon-120x120.png">
    <link rel="apple-touch-icon" sizes="144x144" href="/apple-icon-144x144.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/apple-icon-152x152.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-icon-180x180.png">

    <!-- Android -->
    <link rel="icon" type="image/png" sizes="192x192" href="/android-icon-192x192.png">

    <!-- Navegador -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">

    <!-- Manifest (PWA) -->
    <link rel="manifest" href="/manifest.json">

    <!-- Windows -->
    <meta name="msapplication-TileColor" content="#ffffff">
    <meta name="msapplication-TileImage" content="/ms-icon-144x144.png">

    <!-- Cor do tema (mobile) -->
    <meta name="theme-color" content="#ffffff">

</head>

<body>

    <!-- =============================== -->
    <!-- HEADER (CARREGADO VIA JS) -->
    <!-- =============================== -->
    <header id="header"></header>


    <!-- =============================== -->
    <!-- CONTEÚDO PRINCIPAL -->
    <!-- Será carregado dinamicamente -->
    <!-- =============================== -->
    <main id="main"></main>


    <!-- =============================== -->
    <!-- FOOTER (CARREGADO VIA JS) -->
    <!-- =============================== -->
    <footer id="footer"></footer>


    <!-- =============================== -->
    <!-- TOAST (NOTIFICAÇÕES) -->
    <!-- Ex: produto criado, editado, excluído -->
    <!-- =============================== -->
    <div class="toast-container" id="toastContainer"></div>


    <!-- =============================== -->
    <!-- MODAL DE CONFIRMAÇÃO DE EXCLUSÃO -->
    <!-- =============================== -->
    <div class="modal-overlay" id="modalOverlay" style="display:none;">

        <div class="modal-box">

            <!-- TÍTULO -->
            <h3>Confirmar Exclusão</h3>

            <!-- TEXTO DINÂMICO -->
            <p>
                Tem certeza que deseja excluir o produto 
                <strong id="modalProdutoNome"></strong>? 
                Esta ação não pode ser desfeita.
            </p>

            <!-- BOTÕES -->
            <div class="modal-btns">
                <button class="btn-cancel-del" id="btnCancelDel">
                    Cancelar
                </button>

                <button class="btn-confirm-del" id="btnConfirmDel">
                    Excluir
                </button>
            </div>

        </div>
    </div>


    <!-- =============================== -->
    <!-- SCRIPT PRINCIPAL -->
    <!-- =============================== -->
    <script src="main.js"></script>

</body>
</html>
