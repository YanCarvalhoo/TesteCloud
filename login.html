<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login | System Product</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

</head>
<body>

<div class="left-panel">
    <div class="grid-lines"></div>
    <div class="brand">
        <div class="brand-logo">⬡ System Product</div>
        <div class="brand-tagline">Gestão inteligente de produtos</div>
    </div>
    <div class="left-headline">
        <h1>Controle total<br>do seu <span>estoque</span></h1>
        <p>Cadastre, edite e monitore seus produtos em tempo real com uma interface moderna e eficiente.</p>
    </div>
    <div class="stats-row">
        <div class="stat">
            <div class="stat-value">99%</div>
            <div class="stat-label">Uptime</div>
        </div>
        <div class="stat">
            <div class="stat-value">∞</div>
            <div class="stat-label">Produtos</div>
        </div>
        <div class="stat">
            <div class="stat-value">0ms</div>
            <div class="stat-label">Latência</div>
        </div>
    </div>
</div>

<main class="login-area" id="main"></main>

<script src="login.js"></script>

</body>
</html>
