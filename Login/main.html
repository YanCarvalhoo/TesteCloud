 <div class="login-title">Bem-vindo de volta</div>
    <div class="login-sub">Faça login para acessar o painel</div>

    <div class="alert-msg" id="alertMsg"></div>

    <div class="form-group">
        <label>Usuário</label>
        <input type="text" id="inputUsuario" placeholder="Seu nome de usuário">
        <div class="field-error" id="erroUsuario">Por favor, informe seu usuário.</div>
    </div>

    <div class="form-group">
        <label>Senha</label>
        <input type="password" id="inputSenha" placeholder="Sua senha">
        <div class="field-error" id="erroSenha">Por favor, informe sua senha.</div>
    </div>

    <div class="remember-row">
        <input type="checkbox" id="lembrarSenha">
        <label for="lembrarSenha">Lembrar senha</label>
    </div>

    <button class="btn-login" id="btnLogin">Entrar no Sistema</button>
