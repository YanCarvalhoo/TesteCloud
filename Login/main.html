<!-- =============================== -->
<!-- TÍTULO DO LOGIN -->
<!-- =============================== -->
<div class="login-title">Bem-vindo de volta</div>

<!-- SUBTÍTULO -->
<div class="login-sub">Faça login para acessar o painel</div>


<!-- =============================== -->
<!-- MENSAGEM DE ALERTA (SUCESSO/ERRO) -->
<!-- Controlada via JavaScript -->
<!-- =============================== -->
<div class="alert-msg" id="alertMsg"></div>


<!-- =============================== -->
<!-- CAMPO: USUÁRIO -->
<!-- =============================== -->
<div class="form-group">

    <!-- LABEL -->
    <label>Usuário</label>

    <!-- INPUT -->
    <input 
        type="text" 
        id="inputUsuario" 
        placeholder="Seu nome de usuário"
    >

    <!-- MENSAGEM DE ERRO -->
    <!-- Aparece quando o campo está vazio -->
    <div class="field-error" id="erroUsuario">
        Por favor, informe seu usuário.
    </div>

</div>


<!-- =============================== -->
<!-- CAMPO: SENHA -->
<!-- =============================== -->
<div class="form-group">

    <!-- LABEL -->
    <label>Senha</label>

    <!-- INPUT -->
    <input 
        type="password" 
        id="inputSenha" 
        placeholder="Sua senha"
    >

    <!-- MENSAGEM DE ERRO -->
    <div class="field-error" id="erroSenha">
        Por favor, informe sua senha.
    </div>

</div>


<!-- =============================== -->
<!-- CHECKBOX: LEMBRAR SENHA -->
<!-- =============================== -->
<div class="remember-row">

    <!-- CHECKBOX -->
    <input type="checkbox" id="lembrarSenha">

    <!-- TEXTO -->
    <label for="lembrarSenha">Lembrar senha</label>

</div>


<!-- =============================== -->
<!-- BOTÃO DE LOGIN -->
<!-- Dispara evento no login.js -->
<!-- =============================== -->
<button class="btn-login" id="btnLogin">
    Entrar no Sistema
</button>
